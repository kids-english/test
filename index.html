<!DOCTYPE html>//トップページ
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英単語クイズ：トップメニュー</title>
    <style>
        /* 土木設計のような清潔感のあるブルーを基調としたデザイン */
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #eef2f7; text-align: center; padding: 40px 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        
        h1 { color: #333; font-size: 28px; margin-bottom: 30px; border-bottom: 3px solid #007bff; display: inline-block; padding-bottom: 5px; }

        .menu-list { display: flex; flex-direction: column; gap: 15px; }

        .menu-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 25px;
            background: #fff;
            border: 2px solid #e0e6ed;
            border-radius: 12px;
            text-decoration: none;
            color: #333;
            font-weight: bold;
            font-size: 18px;
            transition: all 0.3s ease;
        }

        /* マウスを乗せた時の動き（ホバー） */
        .menu-item:hover {
            border-color: #007bff;
            background-color: #f0f7ff;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,123,255,0.1);
        }

        .chapter-num { color: #007bff; font-size: 14px; margin-bottom: 4px; display: block; }
        .chapter-title { display: block; }

        .arrow { color: #007bff; font-size: 24px; }

        /* ロックされているチャプター用（まだ作っていない場合） */
        .locked { opacity: 0.6; cursor: not-allowed; background-color: #f9f9f9; }
        .locked:hover { transform: none; box-shadow: none; border-color: #e0e6ed; }
    </style>
</head>
<body>

<div class="container">
    <h1>英単語クイズ</h1>

    <div class="menu-list">
        <a href="chapter1.html" class="menu-item">
            <div>
                <span class="chapter-num">Chapter 1</span>
                <span class="chapter-title">📅 曜日 (Days of the week)</span>
            </div>
            <span class="arrow">→</span>
        </a>

        <a href="chapter2.html" class="menu-item">
            <div>
                <span class="chapter-num">Chapter 2</span>
                <span class="chapter-title">🔢 数字 (Numbers)</span>
            </div>
            <span class="arrow">→</span>
        </a>

        <a href="chapter3.html" class="menu-item">
            <div>
                <span class="chapter-num">Chapter 3</span>
                <span class="chapter-title">🌸 季節 (Seasons)</span>
            </div>
            <span class="arrow">→</span>
        </a>
    </div>
</div>

</body>
</html>
